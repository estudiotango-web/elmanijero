<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>MilongIA · Cámara de pista</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Instrument+Serif&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      background: #0D0904;
      color: #EDE0C4;
      font-family: 'Inter', sans-serif;
      height: 100%;
      overflow: hidden;
    }
    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      padding: 1rem;
    }
    .header {
      text-align: center;
      margin-bottom: 0.75rem;
    }
    .logo {
      font-family: 'Instrument Serif', serif;
      font-size: 22px;
    }
    .logo span { color: #E8B86D; }
    .subtitle {
      font-size: 11px;
      color: #6A6258;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-top: 2px;
    }

    .video-wrap {
      position: relative;
      flex: 1;
      border-radius: 14px;
      overflow: hidden;
      background: #000;
      border: 1px solid #3A2E1A;
    }
    video, canvas {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    canvas { pointer-events: none; }

    .overlay-status {
      position: absolute;
      top: 10px; left: 10px;
      display: flex; align-items: center; gap: 6px;
      background: rgba(13,9,4,0.75);
      border: 0.5px solid #3A2E1A;
      border-radius: 20px;
      padding: 5px 12px;
      font-size: 11px;
      z-index: 10;
    }
    .dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: #6A6258;
    }
    .dot.live { background: #C0272D; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

    .footer {
      margin-top: 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .count-box {
      background: #201810;
      border: 1px solid #5A4020;
      border-radius: 14px;
      padding: 14px 20px;
      flex: 1;
      text-align: center;
    }
    .count-val {
      font-family: 'Instrument Serif', serif;
      font-size: 42px;
      color: #E8B86D;
      line-height: 1;
    }
    .count-label {
      font-size: 10px;
      color: #6A6258;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-top: 4px;
    }

    .btn-toggle {
      background: #8B1A1A;
      color: #EDE0C4;
      border: 1px solid #C0272D;
      border-radius: 14px;
      padding: 14px 22px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-toggle.active {
      background: #201810;
      border-color: #5A4020;
      color: #A89878;
    }

    .sync-info {
      margin-top: 10px;
      text-align: center;
      font-size: 10px;
      color: #5A4E3A;
    }
    .sync-info.error { color: #E24B4A; }
  </style>
</head>
<body>

  <div id="app">
    <div class="header">
      <div class="logo">Milong<span>IA</span> · Cámara</div>
      <div class="subtitle">Sensor de pista</div>
    </div>

    <div class="video-wrap">
      <video id="video" autoplay playsinline muted></video>
      <canvas id="canvas"></canvas>
      <div class="overlay-status">
        <div class="dot" id="status-dot"></div>
        <span id="status-text">Sin iniciar</span>
      </div>
    </div>

    <div class="footer">
      <div class="count-box">
        <div class="count-val" id="count-val">—</div>
        <div class="count-label">personas en pista</div>
      </div>
      <button class="btn-toggle" id="btn-toggle" onclick="toggleDeteccion()">Iniciar</button>
    </div>

    <div class="sync-info" id="sync-info">Esperando primer envío…</div>
    <div class="sync-info" id="perf-info" style="margin-top:2px;">—</div>
  </div>

  <!-- TensorFlow.js + modelo de detección de objetos COCO-SSD -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.20.0/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.3/dist/coco-ssd.min.js"></script>
  <script src="tracking.js"></script>
  <script src="camara.js"></script>
  
</body>
</html>
